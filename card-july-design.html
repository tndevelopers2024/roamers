<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ooty Tour Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Google Font */
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap');

        * {
            font-family: 'Manrope', sans-serif !important;
        }

        body {
            background: url('assets/img/bg/bacground-img-for-card-section.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
        }

        .tour-card {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            color: #fff;
            max-width: 400px;
            margin: 50px auto;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tour-card img {
            width: 100%;
            height: auto;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tour-card .info {
            padding: 20px;
        }

        .tour-card .info h5 {
            font-weight: 700;
        }

        .icon-text {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            margin-bottom: 8px;
        }
        

        .price-book {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .price-book .price {
            color: #00d2ff;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .btn-custom {
            background: linear-gradient(97.87deg, #5CC4DD 0%, #1C93B0 100%);
            box-shadow: 5px 5px 44px 0px #3CADC9B2;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 8px 20px;
        }

        .btn-custom:hover {
            background-color: #00a6dd;
        }
    </style>
</head>

<body>

    <div class="tour-card shadow-lg">
        <img src="your-image.jpg" alt="Ooty" />
        <div class="info">

            <h5>OOTY THE QUEEN OF HILLS</h5>
            <div class="icon-text">
                <i class="bi bi-geo-alt-fill text-info"></i>
                <span>Nilgiris, Coonoor, Coimbatore</span>
            </div>

            <div class="icon-text">
                <i class="bi bi-clock-fill text-info"></i>
                <span>3 days 2 nights</span>
            </div>

            <div class="icon-text">
                <i class="bi bi-calendar-event-fill text-info"></i>
                <span>April 17, May 2, 16, 30</span>
            </div>

            <div class="price-book">
                <div class="price">₹7,499 <span style="font-size: 0.8rem;">/ person</span></div>
                <button class="btn btn-custom">Book Now</button>
            </div>
        </div>
    </div>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</body>

</html>
