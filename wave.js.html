<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roamers - Interactive Bubbles Theme</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap');
        :root {
            --primary: #4ec0db;
            --primary-dark: #3ba0b7;
            --primary-light: #7ed6ea;
            --primary-gradient: linear-gradient(60deg, #4ec0db 0%, #3ba0b7 100%);
            --text-dark: #1a3a4a;
            --text-light: #ffffff;
            --accent: #ffd166;
            --accent2: #ff6f61;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Lato', sans-serif;
            background: linear-gradient(120deg, var(--primary-light) 0%, #eaf6fb 100%);
            overflow-x: hidden;
            color: var(--text-dark);
            line-height: 1.6;
            cursor: auto;
            transition: background 1s linear;
        }
        .header {
            position: relative;
            text-align: center;
            background: var(--primary-gradient);
            color: var(--text-light);
            box-shadow: 0 4px 24px 0 rgba(78, 192, 219, 0.15);
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .inner-header {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
            animation: float 6s ease-in-out infinite;
        }
        .logo {
            width: 120px;
            height: 120px;
            background: var(--text-light);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            margin-bottom: 1rem;
            position: relative;
            overflow: visible;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }
        .logo:active {
            box-shadow: 0 0 0 8px rgba(78,192,219,0.12);
        }
        .logo svg { width: 90px; height: 90px; }
        .logo .logo-glow {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 160px;
            height: 160px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, #4ec0db55 0%, #4ec0db00 80%);
            z-index: 0;
            pointer-events: none;
            animation: logo-glow-pulse 3s infinite alternate;
        }
        @keyframes logo-glow-pulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        h1 {
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 3.7rem;
            color: var(--text-light);
            text-shadow: 0 2px 18px rgba(0, 0, 0, 0.18);
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--accent), var(--primary-light) 60%, var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline {
            font-size: 1.3rem;
            max-width: 650px;
            color: rgba(255, 255, 255, 0.93);
            font-weight: 400;
            margin-bottom: 2.2rem;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.10);
        }
        .bubbles-canvas-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .content {
            position: relative;
            min-height: 30vh;
            text-align: center;
            background: linear-gradient(120deg, var(--primary) 60%, var(--primary-dark) 100%);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2.5rem 2rem 2rem 2rem;
            z-index: 3;
            border-radius: 0 0 32px 32px;
            box-shadow: 0 8px 32px 0 rgba(78, 192, 219, 0.10);
        }
        .content p {
            font-size: 1.5rem;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem;
            font-weight: 300;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.10);
        }
        @keyframes float {
            0% { transform: translateY(0px);}
            50% { transform: translateY(-15px);}
            100% { transform: translateY(0px);}
        }
        @media (max-width: 900px) {
            .content { border-radius: 0 0 24px 24px; }
        }
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .tagline { font-size: 1rem; padding: 0 1rem; }
            .content p { font-size: 1.1rem; }
            .logo { width: 60px; height: 60px; }
            .logo svg { width: 45px; height: 45px; }
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .tagline { font-size: 0.9rem; }
            .content p { font-size: 1rem; }
            .content { border-radius: 0 0 12px 12px; }
        }
        .cursor-bubble {
            position: fixed;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(200,240,255,0.1) 70%);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            transition: width 0.2s, height 0.2s, opacity 0.2s;
            opacity: 0;
        }
        .cursor-bubble.active { opacity: 1; }
    </style>
</head>
<body>
    <div class="header">
        <div class="bubbles-canvas-container">
            <canvas id="bubblesCanvas" tabindex="0" aria-label="Animated bubbles background"></canvas>
        </div>
     
    </div>
    <div class="content">
        <p>
            Move your mouse or tap to create bubbles. Click a bubble to pop it!
        </p>
    </div>
    <script>
    // Interactive Bubbles Animation: Fewer bubbles, only pop on click
    document.addEventListener('DOMContentLoaded', function () {
        const canvas = document.getElementById('bubblesCanvas');
        const container = canvas.parentElement;

        // Animated background gradient
        let bgAngle = 120;
        function animateBackground() {
            bgAngle += 0.03;
            if (bgAngle > 480) bgAngle = 120;
            const color1 = `hsl(${(bgAngle)%360}, 80%, 85%)`;
            const color2 = `hsl(${(bgAngle+60)%360}, 70%, 95%)`;
            document.body.style.background = `linear-gradient(${bgAngle}deg, ${color1} 0%, ${color2} 100%)`;
            requestAnimationFrame(animateBackground);
        }
        animateBackground();

        // Create custom cursor bubble
        const cursorBubble = document.createElement('div');
        cursorBubble.className = 'cursor-bubble';
        document.body.appendChild(cursorBubble);

        // Show/hide custom cursor for better UX
        let cursorVisible = false;
        function showCursor() {
            if (!cursorVisible) {
                cursorBubble.classList.add('active');
                cursorVisible = true;
            }
        }
        function hideCursor() {
            if (cursorVisible) {
                cursorBubble.classList.remove('active');
                cursorVisible = false;
            }
        }
        // Only hide cursor on desktop, not on touch devices
        let isTouch = false;
        document.addEventListener('mousemove', (e) => {
            if (isTouch) return;
            const overCanvas = canvas.getBoundingClientRect();
            if (
                e.clientX >= overCanvas.left && e.clientX <= overCanvas.right &&
                e.clientY >= overCanvas.top && e.clientY <= overCanvas.bottom
            ) {
                showCursor();
                cursorBubble.style.left = `${e.clientX}px`;
                cursorBubble.style.top = `${e.clientY}px`;
            } else {
                hideCursor();
            }
        });
        function detectTouch() {
            isTouch = true;
            cursorBubble.style.display = 'none';
            document.body.style.cursor = 'auto';
        }
        window.addEventListener('touchstart', detectTouch, { once: true });

        // Bubble parameters (responsive, reduced count)
        function getBubbleCount() {
            const w = window.innerWidth;
            if (w < 500) return 4;
            if (w < 900) return 7;
            if (w < 1400) return 10;
            return 14;
        }
        let BUBBLE_COUNT = getBubbleCount();
        const BUBBLE_MIN_RADIUS = 22;
        const BUBBLE_MAX_RADIUS = 48;
        const BUBBLE_MIN_SPEED = 0.12;
        const BUBBLE_MAX_SPEED = 0.32;
        const BUBBLE_MIN_OPACITY = 0.22;
        const BUBBLE_MAX_OPACITY = 0.7;

        // Cursor bubble parameters
        const CURSOR_BUBBLE_MIN_RADIUS = 2;
        const CURSOR_BUBBLE_MAX_RADIUS = 8;
        const CURSOR_BUBBLE_MIN_SPEED = 0.8;
        const CURSOR_BUBBLE_MAX_SPEED = 1.5;
        const CURSOR_BUBBLE_MIN_OPACITY = 0.5;
        const CURSOR_BUBBLE_MAX_OPACITY = 0.9;

        let bubbles = [];
        let cursorBubbles = [];
        let poppingBubbles = [];
        let blastParticles = [];
        let lastMouseX = -100;
        let lastMouseY = -100;
        let lastTrailTime = 0;

        // Helper to get random float in range
        function randf(a, b) {
            return a + Math.random() * (b - a);
        }

        // Responsive canvas
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = container.getBoundingClientRect();
            let width = rect.width || window.innerWidth;
            let height = rect.height || window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + "px";
            canvas.style.height = height + "px";
        }

        // Bubble class
        class Bubble {
            constructor(width, height) {
                this.reset(width, height, true);
            }
            reset(width, height, initial = false) {
                this.radius = randf(BUBBLE_MIN_RADIUS, BUBBLE_MAX_RADIUS);
                this.x = randf(this.radius, width - this.radius);
                this.y = initial
                    ? randf(height * 0.5, height + this.radius * 2)
                    : height + this.radius + randf(0, height * 0.2);
                this.speed = randf(BUBBLE_MIN_SPEED, BUBBLE_MAX_SPEED) * (0.7 + Math.random() * 0.6);
                this.opacity = randf(BUBBLE_MIN_OPACITY, BUBBLE_MAX_OPACITY);
                this.drift = randf(-0.18, 0.18);
                this.osc = randf(0, Math.PI * 2);
                this.oscSpeed = randf(0.008, 0.022);
                this.gloss = Math.random() > 0.5;
                this.popping = false;
                this.rainbow = Math.random() < 0.13;
                this.rainbowPhase = randf(0, Math.PI * 2);
            }
            update(width, height) {
                if (this.popping) return;
                this.y -= this.speed;
                this.x += Math.sin(this.osc) * this.drift;
                this.osc += this.oscSpeed;
                if (this.y + this.radius < -10 || this.x < -this.radius || this.x > width + this.radius) {
                    this.reset(width, height);
                }
                if (this.rainbow) {
                    this.rainbowPhase += 0.03;
                }
            }
            draw(ctx) {
                if (this.popping) return;
                ctx.save();
                ctx.globalAlpha = this.opacity;
                let grad = ctx.createRadialGradient(
                    this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.1,
                    this.x, this.y, this.radius
                );
                grad.addColorStop(0, "rgba(255,255,255,0.95)");
                grad.addColorStop(0.25, "rgba(255,255,255,0.7)");
                grad.addColorStop(0.7, "rgba(200,240,255,0.18)");
                grad.addColorStop(1, "rgba(255,255,255,0.01)");
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.shadowColor = "rgba(180,220,255,0.25)";
                ctx.shadowBlur = 8;
                ctx.fill();
                if (this.rainbow) {
                    let angle = (this.rainbowPhase) % (Math.PI * 2);
                    let grad2 = ctx.createLinearGradient(
                        this.x - this.radius, this.y - this.radius,
                        this.x + this.radius, this.y + this.radius
                    );
                    for (let i = 0; i <= 6; i++) {
                        grad2.addColorStop(i / 6, `hsl(${(angle * 180 / Math.PI + i * 60) % 360}, 90%, 70%)`);
                    }
                    ctx.globalAlpha = this.opacity * 0.25;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 0.95, 0, Math.PI * 2);
                    ctx.fillStyle = grad2;
                    ctx.fill();
                }
                if (this.gloss) {
                    ctx.globalAlpha = this.opacity * 0.7;
                    ctx.beginPath();
                    ctx.ellipse(
                        this.x - this.radius * 0.35,
                        this.y - this.radius * 0.35,
                        this.radius * 0.32,
                        this.radius * 0.13,
                        Math.PI / 4,
                        0,
                        Math.PI * 2
                    );
                    ctx.fillStyle = "rgba(255,255,255,0.55)";
                    ctx.shadowBlur = 0;
                    ctx.fill();
                }
                ctx.globalAlpha = this.opacity * 0.7;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(255,255,255,0.22)";
                ctx.lineWidth = 1.2;
                ctx.shadowBlur = 0;
                ctx.stroke();
                ctx.restore();
            }
            isPointInside(x, y) {
                return Math.sqrt((this.x - x) ** 2 + (this.y - y) ** 2) <= this.radius;
            }
        }

        // Cursor bubble class
        class CursorBubble {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = randf(CURSOR_BUBBLE_MIN_RADIUS, CURSOR_BUBBLE_MAX_RADIUS);
                this.speed = randf(CURSOR_BUBBLE_MIN_SPEED, CURSOR_BUBBLE_MAX_SPEED);
                this.opacity = randf(CURSOR_BUBBLE_MIN_OPACITY, CURSOR_BUBBLE_MAX_OPACITY);
                this.drift = randf(-0.5, 0.5);
                this.osc = randf(0, Math.PI * 2);
                this.oscSpeed = randf(0.02, 0.05);
                this.gloss = Math.random() > 0.3;
                this.popping = false;
                this.lifetime = 100;
            }
            update(width, height) {
                if (this.popping) return;
                this.lifetime--;
                if (this.lifetime <= 0) {
                    this.popping = true;
                    poppingBubbles.push(new PoppingBubble(this.x, this.y, this.radius, this.opacity));
                    return;
                }
                this.y -= this.speed;
                this.x += Math.sin(this.osc) * this.drift;
                this.osc += this.oscSpeed;
                this.opacity *= 0.98;
                if (this.y + this.radius < -10 || this.x < -this.radius || this.x > width + this.radius) {
                    this.popping = true;
                }
            }
            draw(ctx) {
                if (this.popping) return;
                ctx.save();
                ctx.globalAlpha = this.opacity;
                let grad = ctx.createRadialGradient(
                    this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.1,
                    this.x, this.y, this.radius
                );
                grad.addColorStop(0, "rgba(255,255,255,0.95)");
                grad.addColorStop(0.25, "rgba(255,255,255,0.7)");
                grad.addColorStop(0.7, "rgba(200,240,255,0.18)");
                grad.addColorStop(1, "rgba(255,255,255,0.01)");
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.shadowColor = "rgba(180,220,255,0.25)";
                ctx.shadowBlur = 8;
                ctx.fill();
                if (this.gloss) {
                    ctx.globalAlpha = this.opacity * 0.7;
                    ctx.beginPath();
                    ctx.ellipse(
                        this.x - this.radius * 0.35,
                        this.y - this.radius * 0.35,
                        this.radius * 0.32,
                        this.radius * 0.13,
                        Math.PI / 4,
                        0,
                        Math.PI * 2
                    );
                    ctx.fillStyle = "rgba(255,255,255,0.55)";
                    ctx.shadowBlur = 0;
                    ctx.fill();
                }
                ctx.globalAlpha = this.opacity * 0.7;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(255,255,255,0.22)";
                ctx.lineWidth = 1.2;
                ctx.shadowBlur = 0;
                ctx.stroke();
                ctx.restore();
            }
        }

        // Blast particle for realistic bubble blast
        class BlastParticle {
            constructor(x, y, color, angle, speed, radius, opacity) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.angle = angle;
                this.speed = speed;
                this.radius = radius;
                this.opacity = opacity;
                this.life = 0;
                this.maxLife = randf(18, 32);
                this.gravity = randf(0.01, 0.04);
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity * this.life;
                this.speed *= 0.96;
                this.opacity *= 0.97;
                this.radius *= 0.97;
                this.life++;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.opacity);
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(0.5, this.radius), 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 8;
                ctx.fill();
                ctx.restore();
            }
            isDone() {
                return this.life > this.maxLife || this.opacity < 0.05 || this.radius < 0.5;
            }
        }

        // Popping animation for bubbles (kept for ring effect)
        class PoppingBubble {
            constructor(x, y, radius, opacity) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.opacity = opacity;
                this.frame = 0;
                this.maxFrames = 18;
            }
            update() { this.frame++; }
            draw(ctx) {
                ctx.save();
                let progress = this.frame / this.maxFrames;
                let ringRadius = this.radius + progress * this.radius * 0.7;
                let ringAlpha = (1 - progress) * this.opacity * 0.7;
                ctx.globalAlpha = ringAlpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, ringRadius, 0, Math.PI * 2);
                ctx.lineWidth = 2.5 + 2 * (1 - progress);
                ctx.strokeStyle = "rgba(255,255,255,0.7)";
                ctx.shadowColor = "rgba(255,255,255,0.5)";
                ctx.shadowBlur = 8 * (1 - progress);
                ctx.stroke();
                let shardCount = 6 + Math.floor(Math.random() * 3);
                for (let i = 0; i < shardCount; i++) {
                    let angle = (Math.PI * 2 / shardCount) * i + Math.random() * 0.2;
                    let len = this.radius * 0.7 + progress * this.radius * 1.2;
                    let shardAlpha = ringAlpha * 0.7;
                    ctx.save();
                    ctx.globalAlpha = shardAlpha;
                    ctx.beginPath();
                    ctx.moveTo(
                        this.x + Math.cos(angle) * (this.radius * 0.7),
                        this.y + Math.sin(angle) * (this.radius * 0.7)
                    );
                    ctx.lineTo(
                        this.x + Math.cos(angle) * (this.radius * 0.7 + len * 0.5 * (1 - progress)),
                        this.y + Math.sin(angle) * (this.radius * 0.7 + len * 0.5 * (1 - progress))
                    );
                    ctx.strokeStyle = "rgba(255,255,255,0.6)";
                    ctx.lineWidth = 1.2 + 1 * (1 - progress);
                    ctx.stroke();
                    ctx.restore();
                }
                ctx.restore();
            }
            isDone() { return this.frame >= this.maxFrames; }
        }

        function createBubbles(width, height) {
            bubbles = [];
            for (let i = 0; i < BUBBLE_COUNT; i++) {
                bubbles.push(new Bubble(width, height));
            }
        }

        // Bubble trails on fast cursor movement
        function createBubbleTrail(x, y, speed) {
            let count = speed > 18 ? 2 : speed > 8 ? 1 : 0;
            for (let i = 0; i < count; i++) {
                cursorBubbles.push(new CursorBubble(
                    x + randf(-8, 8),
                    y + randf(-8, 8)
                ));
            }
        }

        // Generate bubbles at cursor position
        function createCursorBubbles(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            let dx = x - lastMouseX;
            let dy = y - lastMouseY;
            let dist = Math.sqrt(dx * dx + dy * dy);
            let now = performance.now();
            if (now - lastTrailTime > 18) {
                createBubbleTrail(x, y, dist);
                lastTrailTime = now;
            }
            lastMouseX = x;
            lastMouseY = y;
        }

        // Touch support for mobile
        function handleTouch(e) {
            if (e.touches && e.touches.length > 0) {
                for (let i = 0; i < e.touches.length; i++) {
                    const touch = e.touches[i];
                    createCursorBubbles({
                        clientX: touch.clientX,
                        clientY: touch.clientY
                    });
                }
            }
        }
        document.addEventListener('touchmove', handleTouch, { passive: true });
        document.addEventListener('touchstart', handleTouch, { passive: true });

        // No automatic collision popping
        function checkCollisions(width, height) {
            // No-op: Bubbles do not pop on collision anymore
        }

        // Bubble popping on click - now with realistic blast!
        function handleBubbleClick(e) {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            const x = (e.clientX - rect.left) * dpr;
            const y = (e.clientY - rect.top) * dpr;
            let width = canvas.width;
            let height = canvas.height;
            for (let i = 0; i < bubbles.length; i++) {
                let bubble = bubbles[i];
                if (!bubble.popping && bubble.isPointInside(x / dpr, y / dpr)) {
                    bubble.popping = true;
                    // Add blast particles for realistic effect
                    let particleCount = Math.floor(randf(18, 28));
                    let baseColor = bubble.rainbow
                        ? `hsl(${Math.floor(randf(0,360))},90%,70%)`
                        : "rgba(200,240,255,0.85)";
                    for (let j = 0; j < particleCount; j++) {
                        let angle = randf(0, Math.PI * 2);
                        let speed = randf(bubble.radius * 0.18, bubble.radius * 0.38);
                        let color;
                        if (bubble.rainbow) {
                            color = `hsl(${Math.floor(randf(0,360))},90%,80%)`;
                        } else {
                            // Subtle blue/white/transparent
                            let c = Math.floor(randf(200,255));
                            color = `rgba(${c},${c+randf(10,30)},255,${randf(0.5,0.95)})`;
                        }
                        let radius = randf(bubble.radius * 0.09, bubble.radius * 0.22);
                        let opacity = randf(0.5, 1.0) * bubble.opacity;
                        blastParticles.push(new BlastParticle(
                            bubble.x, bubble.y, color, angle, speed, radius, opacity
                        ));
                    }
                    poppingBubbles.push(new PoppingBubble(bubble.x, bubble.y, bubble.radius, bubble.opacity));
                    bubble.reset(width / dpr, height / dpr);
                    break; // Only pop one bubble per click
                }
            }
        }
        canvas.addEventListener('click', handleBubbleClick);

        function animate() {
            resizeCanvas();
            const dpr = window.devicePixelRatio || 1;
            const width = canvas.width / dpr;
            const height = canvas.height / dpr;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (bubbles.length !== BUBBLE_COUNT) {
                createBubbles(width, height);
            }
            for (let bubble of bubbles) {
                bubble.update(width, height);
            }
            checkCollisions(width, height);
            for (let bubble of bubbles) {
                bubble.draw(ctx);
            }
            for (let i = cursorBubbles.length - 1; i >= 0; i--) {
                let bubble = cursorBubbles[i];
                bubble.update(width, height);
                bubble.draw(ctx);
                if (bubble.popping) {
                    cursorBubbles.splice(i, 1);
                }
            }
            // Draw and update blast particles
            for (let i = blastParticles.length - 1; i >= 0; i--) {
                let p = blastParticles[i];
                p.update();
                p.draw(ctx);
                if (p.isDone()) {
                    blastParticles.splice(i, 1);
                }
            }
            for (let i = poppingBubbles.length - 1; i >= 0; i--) {
                let pop = poppingBubbles[i];
                pop.update();
                pop.draw(ctx);
                if (pop.isDone()) {
                    poppingBubbles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }

        // On resize, recreate bubbles for new dimensions
        function handleResize() {
            resizeCanvas();
            BUBBLE_COUNT = getBubbleCount();
            const dpr = window.devicePixelRatio || 1;
            createBubbles(canvas.width / dpr, canvas.height / dpr);
        }

        // Add mouse move event listener for cursor bubbles
        canvas.addEventListener('mousemove', (e) => {
            if (!isTouch) createCursorBubbles(e);
        });

        window.addEventListener('resize', handleResize);

        // Accessibility: allow keyboard focus to canvas and show outline
        canvas.addEventListener('focus', function() {
            canvas.style.outline = '2px solid var(--accent)';
        });
        canvas.addEventListener('blur', function() {
            canvas.style.outline = '';
        });

        // Initial setup
        handleResize();
        animate();
    });
    </script>
</body>
</html>
